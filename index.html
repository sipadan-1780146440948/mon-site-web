<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site en Construction</title>
    <style>
        /* Style général de la page */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(246, 246, 246);
            color: #2d3748;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Conteneur du message "En construction" */
        .construction-container {
            text-align: center;
            max-width: 600px;
            margin: 20px;
            padding: 40px 30px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 28px;
            color: #1a202c;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            color: #718096;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Style du bouton d'ouverture de la pop-up */
        .btn-contact {
            background-color: rgb(87, 70, 227); /* Violet Google Forms */
            color: white;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 10px rgba(103, 58, 183, 0.25);
        }

        .btn-contact:hover {
            background-color: #512da8;
        }

        .btn-contact:active {
            transform: scale(0.98);
        }

        /* ARRIÈRE-PLAN DE LA POP-UP (FOND SOMBRE COUVRANT) */
        .popup-overlay {
            display: none; /* Caché par défaut */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Effet d'assombrissement */
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* LA FENÊTRE POP-UP (BOITE BLANCHE CONTEUR) */
        .popup-box {
            background: white;
            width: 100%;
            max-width: 700px;
            height: 85vh; /* Prend 85% de la hauteur de l'écran */
            max-height: 950px;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Empêche les éléments de déborder */
        }

        /* BOUTON FERMER (LA CROIX) */
        .btn-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 28px;
            font-weight: bold;
            color: #a0aec0;
            cursor: pointer;
            z-index: 1010;
            line-height: 1;
            transition: color 0.2s ease;
        }

        .btn-close:hover {
            color: #4a5568;
        }

        /* IFRAME : Sans bordure et sans scroll */
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* Pas de bordure */
            overflow: hidden; /* Pas de barre de défilement */
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="construction-container">
        <div class="icon">🚧</div>
        <h1>Site en cours de construction</h1>
        <p>Notre nouveau site web arrive très bientôt ! En attendant, vous pouvez nous poser vos questions ou nous laisser un message directement en cliquant ci-dessous.</p>
        
        <button class="btn-contact" onclick="togglePopup(true)">Nous contacter</button>
    </div>

    <div class="popup-overlay" id="contactPopup" onclick="checkClose(event)">
        <div class="popup-box">
            <span class="btn-close" onclick="togglePopup(false)">&times;</span>
            
            <div id="iframePosition" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <script>
        const formUrl = "https://forms.gle/QzJn2j9HyoFGodv8A" ;
        let isFormLoaded = false;

        function togglePopup(show) {
            const popup = document.getElementById('contactPopup');
            const targetContainer = document.getElementById('iframePosition');
            
            popup.style.display = show ? 'flex' : 'none';
            document.body.style.overflow = show ? 'hidden' : 'auto';

            // Injection dynamique au tout premier clic (Lazy Loading total)
            if (show && !isFormLoaded) {
                const iframe = document.createElement('iframe');
                iframe.src = formUrl;
                //iframe.setAttribute('scrolling', 'no');
                iframe.innerHTML = "Chargement du formulaire en cours...";
                
                targetContainer.appendChild(iframe);
                isFormLoaded = true; // Empêche de recharger l'iframe à chaque réouverture
            }
        }

        function checkClose(event) {
            if (event.target.classList.contains('popup-overlay')) {
                togglePopup(false);
            }
        }
    </script>

</body>
</html>
